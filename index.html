<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>支払い管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">

  <!-- Top tabs -->
  <div class="top-tabs">
    <button class="tab-btn is-active" id="tabA" onclick="switchPage('A')">テキスト</button>
    <div class="tab-arrow" id="arrowEl">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="10" x2="17" y2="10"/>
        <polyline points="12 5 17 10 12 15"/>
      </svg>
    </div>
    <button class="tab-btn is-inactive" id="tabB" onclick="switchPage('B')">テキスト</button>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area" id="scrollArea"></div>

  <!-- FAB -->
  <button class="fab" onclick="openModal()">＋</button>

  <!-- Bottom bar -->
  <div class="bottom-bar">メニューバー</div>

  <!-- ── Add modal ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="bgClose(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title">支払いを追加</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <!-- 基本情報 -->
      <div class="form-section">
        <div class="form-row">
          <span class="form-label">日時</span>
          <input class="form-input" type="datetime-local" id="inputDate" />
        </div>
        <div class="form-row">
          <span class="form-label">金額</span>
          <input class="form-input" type="number" id="inputAmount" placeholder="0" min="0" />
          <span style="font-size:15px;color:var(--text-secondary);flex-shrink:0;">円</span>
        </div>
        <div class="form-row">
          <span class="form-label">メモ</span>
          <input class="form-input" type="text" id="inputMemo" placeholder="任意" />
        </div>
      </div>

      <!-- 対象・状態 -->
      <div class="form-section">
        <div class="form-row">
          <span class="form-label">対象者</span>
          <div class="toggle-group">
            <button class="tgl tgl-purple" id="tgtA" onclick="setTarget('A')">自分</button>
            <button class="tgl tgl-off"    id="tgtB" onclick="setTarget('B')">相手</button>
          </div>
        </div>
        <div class="form-row">
          <span class="form-label">状態</span>
          <div class="toggle-group">
            <button class="tgl tgl-red"   id="stUnpaid" onclick="setState('unpaid')">未支払い</button>
            <button class="tgl tgl-off"   id="stPaid"   onclick="setState('paid')">支払い済み</button>
          </div>
        </div>
      </div>

      <button class="submit-btn" onclick="submitEntry()">追加する</button>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
